services:
  database:
    container_name: "${DB_CONTAINER_NAME}"
    image: "${DB_IMAGE}"
    restart: always
    command:
      - "--port=${DB_PORT}"
    ports:
      - "${DB_PORT}:${DB_PORT}"
    environment:
      MARIADB_DATABASE: "${DB_NAME}"
      MARIADB_USER: "${DB_USER}"
      MARIADB_PASSWORD: "${DB_PASSWORD}"
      MARIADB_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
    volumes:
      - database_data:/var/lib/mysql
    healthcheck:
      test:
        - CMD-SHELL
        - "mariadb-admin ping -h 127.0.0.1 -P ${DB_PORT} -u root -p$$MARIADB_ROOT_PASSWORD --silent"
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  app:
    container_name: "${APP_CONTAINER_NAME}"
    image: "${APP_IMAGE}"
    restart: always
    ports:
      - "${APP_PORT}:${APP_INTERNAL_PORT}"
    environment:
      DB_TYPE: "${DB_TYPE}"
      DB_HOST: "database"
      DB_PORT: "${DB_PORT}"
      DB_NAME: "${DB_NAME}"
      DB_USER: "${DB_USER}"
      DB_PASS: "${DB_PASSWORD}"
    depends_on:
      database:
        condition: service_healthy

volumes:
  database_data:
